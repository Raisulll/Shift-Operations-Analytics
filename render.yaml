# Render Blueprint for the Django API (backend only). Database is Supabase
# Postgres; the React frontend is on Vercel. Deploy by pointing Render at this
# repo — it reads this file and creates the web service.
#
# Data is durable: records live in Supabase Postgres, so uploaded datasets
# persist across restarts and free-tier sleeps. On boot we run `migrate` and seed
# the bundled sample only when the DB is still empty (`load_dataset --if-empty`),
# so a restart never overwrites an uploaded dataset.
#
# Set these in the Render dashboard after the first deploy (they are secrets /
# environment-specific, so they are not committed here):
#   DATABASE_URL          -> Supabase "Session pooler" URI (port 5432),
#                            e.g. postgresql://postgres.<ref>:<pw>@aws-0-<region>.pooler.supabase.com:5432/postgres?sslmode=require
#   CORS_ALLOWED_ORIGINS  -> your Vercel URL, e.g. https://your-app.vercel.app
services:
  - type: web
    name: shift-analytics-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate --noinput && python manage.py load_dataset --if-empty && gunicorn config.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"   # bump if the pandas/numpy wheels need a newer Python
      - key: SECRET_KEY
        generateValue: true   # Render generates a strong secret
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        sync: false   # paste the Supabase Session-pooler URL in the dashboard
      - key: CORS_ALLOWED_ORIGINS
        sync: false   # set to your Vercel URL, e.g. https://your-app.vercel.app
      - key: GROQ_API_KEY
        sync: false   # optional: enables the AI "Suggest grouping" feature (free Groq key)
      - key: GROQ_MODEL
        value: "llama-3.3-70b-versatile"
